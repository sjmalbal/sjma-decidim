name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  AZURE_CORE_OUTPUT: none

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in Azure Container Registry
        run: |
          az acr build \
            --registry "${{ vars.AZURE_ACR_NAME }}" \
            --image "${{ vars.AZURE_APP_NAME }}:${{ github.sha }}" \
            --image "${{ vars.AZURE_APP_NAME }}:main" \
            .

      - name: Deploy image to App Service
        run: |
          ACR_LOGIN_SERVER="$(az acr show \
            --name "${{ vars.AZURE_ACR_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --query loginServer \
            --output tsv)"

          az webapp config set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_APP_NAME }}" \
            --generic-configurations '{"acrUseManagedIdentityCreds": true}'

          az webapp config container set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_APP_NAME }}" \
            --container-image-name "${ACR_LOGIN_SERVER}/${{ vars.AZURE_APP_NAME }}:${{ github.sha }}" \
            --container-registry-url "https://${ACR_LOGIN_SERVER}" \
            --enable-app-service-storage false

          SYNC_STATUTE_DRAFT_CONTENT="${{ vars.SYNC_STATUTE_DRAFT_CONTENT }}"
          SYNC_STATUTE_DRAFT_CONTENT="${SYNC_STATUTE_DRAFT_CONTENT:-true}"
          SYNC_STATUTE_DRAFT_CONTENT_APPLY="${{ vars.SYNC_STATUTE_DRAFT_CONTENT_APPLY }}"
          SYNC_STATUTE_DRAFT_CONTENT_APPLY="${SYNC_STATUTE_DRAFT_CONTENT_APPLY:-true}"
          ALLOW_PUBLISHED_STATUTE_CONTENT_CHANGE="${{ vars.ALLOW_PUBLISHED_STATUTE_CONTENT_CHANGE }}"
          ALLOW_PUBLISHED_STATUTE_CONTENT_CHANGE="${ALLOW_PUBLISHED_STATUTE_CONTENT_CHANGE:-false}"

          az webapp config appsettings set \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_APP_NAME }}" \
            --settings \
              SYNC_STATUTE_DRAFT_CONTENT="${SYNC_STATUTE_DRAFT_CONTENT}" \
              SYNC_STATUTE_DRAFT_CONTENT_APPLY="${SYNC_STATUTE_DRAFT_CONTENT_APPLY}" \
              ALLOW_PUBLISHED_STATUTE_CONTENT_CHANGE="${ALLOW_PUBLISHED_STATUTE_CONTENT_CHANGE}" \
            --output none

          az webapp restart \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AZURE_APP_NAME }}"
