  title: DISPOSICIÓ FINAL
  body: <span class="sjma-change-marker">Aquests Estatuts entraran en vigor des de
    la data de la seua aprovació per l’Assemblea General i tindran efectes davant
    de terceres persones des de la seua inscripció en el Registre d’Associacions de
