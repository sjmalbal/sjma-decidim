  title: 'CAPÍTOL QUART: DE LA DISSOLUCIÓ I LA LIQUIDACIÓ DE LA SOCIETAT'
  body: 'CAPÍTOL QUART: DE LA DISSOLUCIÓ I LA LIQUIDACIÓ DE LA SOCIETAT'
- source_id: 620
  position: 144
  participatory_text_level: article
  title: Article 105. De les causes de dissolució
  body: |-
    <span class="sjma-change-marker">La Societat es dissoldrà per les següents causes:</span>

    <span class="sjma-change-marker">a) Per Acord de l’Assemblea General, convocada expressament amb aquesta finalitat, amb el vot favorable de la majoria absoluta de l’Assemblea General.</span>

    <span class="sjma-change-marker">b) Per reducció del nombre de Persones Associades a menys de tres.</span>

    <span class="sjma-change-marker">c) Per les causes previstes en aquestos Estatuts.</span>

    <span class="sjma-change-marker">d) Per les causes determinades a l’article 39 del Codi Civil i la resta de normativa aplicable.</span>

    <span class="sjma-change-marker">e) Per sentència judicial ferma.</span>
- source_id: 621
  position: 145
  participatory_text_level: article
  title: Article 106. De la liquidació
  body: |-
    <span class="sjma-change-marker">1. Una vegada acordada o declarada la dissolució, s’obrirà el període de liquidació, durant el qual la Societat conservarà la seua personalitat jurídica fins a la finalització de les operacions de liquidació i la cancel·lació dels assentaments registrals.</span>

    <span class="sjma-change-marker">2. L’Assemblea General podrà designar una Comissió Liquidadora. Si no la designara, actuaran com a persones liquidadores les persones que formen part de la Junta Directiva en el moment de la dissolució, llevat que l’Assemblea General o l’autoritat judicial competent acorde altra cosa.</span>

    <span class="sjma-change-marker">3. Correspon a les persones liquidadores:</span>

    <span class="sjma-change-marker">a) Vetlar per la integritat del patrimoni de la Societat i portar-ne els comptes.</span>

    <span class="sjma-change-marker">b) Concloure les operacions pendents i efectuar les noves que siguen necessàries per a la liquidació.</span>

    <span class="sjma-change-marker">c) Cobrar els crèdits de la Societat.</span>

    <span class="sjma-change-marker">d) Liquidar el patrimoni i pagar les persones creditores.</span>

    <span class="sjma-change-marker">e) Aplicar els béns sobrants de la Societat al destí previst en aquestos Estatuts i en la normativa vigent aplicable.</span>

    <span class="sjma-change-marker">f) Sol·licitar la cancel·lació dels assentaments del Registre d’Associacions.</span>

    <span class="sjma-change-marker">4. El romanent net que resulte de la liquidació, si n’hi haguera, es destinarà, d’acord amb el que determine l’Assemblea General i amb respecte a la normativa vigent aplicable, prioritàriament a una altra societat musical del municipi d’Albal que perseguisca finalitats anàlogues a les de la Societat. Si no existira cap entitat d’aquestes característiques o cap d’elles poguera acceptar adequadament el romanent, es destinarà a una associació cultural, fundació, entitat pública o altra entitat sense ànim de lucre, en tots els casos vinculada al municipi d’Albal, que perseguisca finalitats musicals, culturals, educatives, socials o d’interés general anàlogues a les de la Societat.</span>

    <span class="sjma-change-marker">5. L’entitat destinatària haurà d’acceptar expressament que el romanent quede afectat, en la mesura que siga possible, a la conservació, promoció, ensenyament o pràctica de la música al municipi d’Albal. Quan el romanent incloga instruments, arxius, material musical o altres béns vinculats directament a l’activitat musical de la Societat, l’Acord de destinació procurarà que aquests béns romanguen al municipi d’Albal i continuen destinats a finalitats musicals, educatives o culturals.</span>

    <span class="sjma-change-marker">6. Quan el romanent no haja sigut destinat a una societat musical del municipi d’Albal i posteriorment es constituïra una nova societat musical al municipi amb finalitats anàlogues a les de la Societat, es promourà, sempre que siga legalment possible i d’acord amb les condicions acceptades per l’entitat destinatària, la cessió, transmissió o posada a disposició dels instruments, arxius, material musical o altres béns vinculats directament a l’activitat musical de la Societat a favor d’aquesta nova entitat.</span>

    <span class="sjma-change-marker">7. En cap cas el romanent podrà repartir-se entre les Persones Associades ni entre persones físiques o jurídiques amb interés lucratiu.</span>

    <span class="sjma-change-marker">8. En cas d’insolvència de la Societat, la Junta Directiva, la Comissió Liquidadora o les persones liquidadores promouran immediatament el procediment que corresponga davant l’òrgan competent.</span>
- source_id: 622
  position: 146
  participatory_text_level: article
  title: DISPOSICIÓ TRANSITÒRIA ÚNICA
  body: |-
    <span class="sjma-change-marker">Les Agrupacions Artístiques Titulars existents en el moment d’entrada en vigor d’aquestos Estatuts comptaran inicialment amb el següent nombre de Persones Delegades:</span>

    <span class="sjma-change-marker">a) Banda Simfònica: 3 Persones Delegades.</span>

    <span class="sjma-change-marker">b) Colla de Dolçaina i Percussió: 1 Persona Delegada.</span>

    <span class="sjma-change-marker">c) Orquestra: 1 Persona Delegada.</span>

    <span class="sjma-change-marker">d) Cor d’Adults: 1 Persona Delegada.</span>

    <span class="sjma-change-marker">Aquest nombre podrà ser modificat posteriorment per Resolució de la Junta Directiva en els termes previstos en aquestos Estatuts.</span>
- source_id: 623
