  Article 42. De la responsabilitat de la Junta Directiva de la seua gestió front a l’Assemblea General:
  - kind: addition
    summary: >-
      Justificació: reforça la responsabilitat de la Junta Directiva davant l'Assemblea General i ordena el control polític
      de la seua gestió.
    old_text: ''
    draft_text: |-
      1. La Junta Directiva retrà comptes de la seua gestió i actuació davant de l’Assemblea General en els termes previstos en aquestos Estatuts.

      2. La Presidència de la Junta Directiva, prèvia deliberació amb la Junta Directiva en reunió, podrà plantejar davant de l’Assemblea General en sessió ordinària el vot de confiança sobre la gestió i actuació de la seua Junta Directiva.

      La confiança s’entendrà atorgada quan vote a favor d’aquesta la majoria simple de les persones presents amb dret a vot de l’Assemblea General. Quan no siga així, s’entendrà revocada la confiança en la Presidència de la Junta Directiva i cessades totes les persones components de la Junta Directiva en aquell moment, i es convocarà nova sessió extraordinària de l’Assemblea General per la Presidència cessada per a triar la nova Presidència de la Junta Directiva. Mentrestant, la Junta Directiva revocada continuarà funcionant en el règim d’interinitat previst en aquestos Estatuts fins a que es trie la nova Junta Directiva.

      3. L’Assemblea General pot revocar en sessió extraordinària la confiança a la Presidència de la Junta Directiva mitjançant el vot de censura. Aquest haurà de ser proposat per almenys un 10 per cent dels components amb dret a vot de l’Assemblea General en l’escrit de sol·licitud de convocatòria de reunió extraordinària i haurà d’incloure una nova candidatura a la Presidència i als restants càrrecs de la Junta Directiva.

      El vot de censura s’entendrà aprovat quan vote a favor d’aquest la majoria absoluta de les persones presents amb dret a vot de l’Assemblea General. Llavors, s’entendrà revocada la confiança en la persona que assumira la Presidència de la Junta Directiva i cessades totes les persones components de la Junta Directiva en aquell moment. Alhora, la candidatura proponent del vot de censura quedarà escollida com a nova Presidència de la Junta Directiva, havent de procedir-se a partir d’aquest punt en la mateixa sessió d’acord amb el que es disposa a l’article 29.2.g) d’aquestos Estatuts.
