  Article 50. Funcions de les Persones Delegades:
  - kind: addition
    summary: 'Justificació: detalla funcions de coordinació, control d''assistència i comunicació de les Persones Delegades.'
    old_text: ''
    draft_text: |-
      1. A les Persones Delegades els correspon, en general, col·laborar amb la corresponent Direcció tècnic-artística en la coordinació de les activitats de les agrupacions artístiques o unitats culturals a les que pertanyen.

      Prèvia exposició d’aquestes als demés components de la seua agrupació artística, podran elaborar recomanacions i suggerències per a la millora i el progrés de l’activitat artística de la corresponent agrupació o unitat i de la Societat en general i exposar-les a la Direcció tècnic-artística i a la Junta Directiva.

      2. En particular per a les Persones Delegades de les agrupacions musicals de la Societat, seran responsables de les següents funcions:

      a) Elaborar el Part dels assajos i concerts, controlant l’assistència dels músics i advertint dels incidents ocorreguts i les possibles faltes disciplinàries que s’hagueren pogut cometre.

      b) Junt a la Junta Directiva, i dins de les seues capacitats i de la naturalesa de cada agrupació artística o unitat cultural, encarregar-se de l’organització i condicionament de la sala d’assajos i de concerts o altres activitats relacionades amb l’organització de l’activitat artística de l’agrupació artística o unitat cultural a la que pertanyen, així com del correcte ús, ordre i emmagatzemament dels instruments i demés objectes propietat de la Societat en els assajos, concerts i demés activitats artístiques o socials.

      c) A proposta de la corresponent Direcció tècnic-artística, elaborar la convocatòria de músics per a cada actuació, la qual serà presentada per al seu vistiplau a la Junta Directiva o persona en qui aquesta delegue per a aquesta funció.

      d) Les restants funcions que els siguen atribuïdes per aquestos Estatuts.

      3. Les persones que componen les corresponents agrupacions artístiques o unitats culturals col·laboraran amb les seues Persones Delegades en el desenvolupament de les seues funcions segons les seues necessitats.
