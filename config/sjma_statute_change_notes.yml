  Article 48. De la direcció artística i tècnica:
  - kind: addition
    summary: >-
      Justificació: obre la direcció de les agrupacions a estructures artístiques i tècniques flexibles, sempre exercides
      per personal contractat per la Societat, de manera que el cas ordinari puga ser una Direcció tècnic-artística única
      però també es puguen distribuir funcions entre diverses direccions contractades.
    old_text: ''
    draft_text: |-
      1. Cada Agrupació Artística Titular comptarà, com a mínim, amb una Direcció tècnic-artística, exercida per una persona contractada per la Societat.

      2. Quan la naturalesa, dimensió, activitat o projecció de l’Agrupació ho requerisca, la Junta Directiva podrà ampliar, modificar o reduir mitjançant Resolució l’estructura de direcció artística i tècnica de l’Agrupació, que podrà estar integrada per una o diverses persones contractades per la Societat, diferenciant, si escau, funcions de direcció artística, direcció tècnica, direcció titular, direccions convidades o altres responsabilitats artístiques anàlogues.

      3. En aquests Estatuts, les referències a la Direcció tècnic-artística de l’Agrupació s’entendran fetes a la persona contractada que exercisca aquesta funció o, si escau, a les persones contractades que integren l’estructura de direcció artística i tècnica de l’Agrupació, dins de les funcions que cadascuna tinga atribuïdes.

      4. Corresponen a la Direcció tècnic-artística de l’Agrupació, dins de l’àmbit de les seues responsabilitats, la direcció artística de l’Agrupació, la planificació de l’activitat ordinària, la preparació dels assajos i actuacions, la proposta de projectes i repertoris, la coordinació amb la Junta Directiva i l’assessorament artístic que aquesta requerisca.

      5. La Direcció tècnic-artística de l’Agrupació acatarà i complirà aquests Estatuts, els Acords de l’Assemblea General i les Resolucions de la Junta Directiva, sense perjuí de la seua llibertat artística, de les seues competències tècniques i de les condicions determinades en la relació professional establerta amb la Societat.
