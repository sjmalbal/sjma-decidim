  Article 73. Del dret d’accés a la informació social:
  - kind: addition
    summary: 'Justificació: reconeix el dret d''accés a la informació social i el canalitza de manera ordenada.'
    old_text: ''
    draft_text: |-
      1. Totes les Persones Associades tenen dret a accedir a tota la informació social, entenent-se per tal els continguts o documents, siga quin fora el seu format o suport, que obren en poder d’alguna de les persones que conformen la Junta Directiva de la Societat i que hagen estat elaborats o adquirits en l’exercici de les seues funcions, així com de l’Arxiu de la Societat.

      2. El dret d’accés a la informació social podrà ser limitat quan afecte a les dades personals de qualsevol persona. En aquest cas, i quan no afecte a la totalitat de la informació, es podrà facilitar l’accés parcial a la informació social prèvia dissociació de la informació afectada. Quan així fora i la informació resultara distorsionada o mancara de sentit, haurà d’indicar-se que ha sigut omesa part de la informació.
