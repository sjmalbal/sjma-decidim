  Article 72. De la protecció de dades personals:
  - kind: addition
    summary: 'Justificació: incorpora una regulació bàsica de protecció de dades personals adaptada a la normativa actual.'
    old_text: ''
    draft_text: |-
      1. La Societat es compromet amb la protecció de les dades personals de les Persones Associades i del públic en general d’acord amb les disposicions normatives vigents sobre la matèria.

      La Societat serà responsable del seu tractament, sent l’òrgan encarregat d’aquest tractament la Secretaria quan no es delegue o encomane per la Junta Directiva a cap altre càrrec o persona.

      2. Les Persones Associades podran exercir els drets d’accés, rectificació, supressió, oposició i supressió amb respecte a les seues dades personals de les quals la Societat siga responsable del seu tractament en els termes previstos en la legislació vigent aplicable.
