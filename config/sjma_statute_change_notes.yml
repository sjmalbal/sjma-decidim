  Article 11. Causes de baixa i pèrdua de la condició de Persona Associada:
  - kind: modification
    summary: >-
      Justificació: actualitza les causes de baixa i pèrdua de la condició de Persona Associada i les adapta al nou règim
      disciplinari dels estatuts.
    old_text: |-
      Articulo 14.- Causas de baja y pérdida de la condición de socio.- Son causa de baja de la Asociación:

      1ª.- Por fallecimiento.

      2ª.- La propia voluntad del interesado comunicada por escrito a la Junta Directiva

      3ª.- No satisfacer las cuotas ordinarias y derramas extraordinarias acordadas por la Asamblea General por el periodo de ..DOS AÑOS .........

      4ª.- No cumplir las obligaciones estatutarias o reglamentarias.

      5ª.- Por sanción disciplinaria, previo expediente regulado bajo los principios de presunción de inocencia, inmediación, audiencia y contradicción.

      6ª.- Por cualquier otra causa prevista en las leyes.

      El acuerdo de expulsión o separación será adoptado por la Junta Directiva, en resolución motivada, que será notificada por escrito al sancionado, previo expediente disciplinario y audiencia del interesado.

      Contra el acuerdo, en el plazo de 15 días podrá recurrirse en alzada ante la primera Asamblea General que se celebre, en cuya alzada la Asamblea adoptará la resolución procedente que tendrá carácter definitivo. Desde la notificación del acuerdo de expulsión adoptado por la Junta Directiva hasta la resolución definitiva de la Asamblea General, cuando se hubiese interpuesto el recurso de alzada, la condición de socio del afectado quedará en suspenso, así como los derechos y deberes derivados de dicha condición.
    draft_text: |-
      b) La pròpia voluntat de la persona interessada comunicada a la Junta Directiva per escrit, per correu electrònic, formulari electrònic o altres canals habilitats per la Societat.

