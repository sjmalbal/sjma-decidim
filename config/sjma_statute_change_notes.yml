      4. La transparència de la Societat inclourà també el compliment de les obligacions de publicitat, justificació, rendició de comptes o informació que deriven de subvencions, convenis, contractes, declaracions d’utilitat pública, reconeixements d’interés públic o qualsevol altra normativa aplicable.

      5. Les previsions d’aquest article podran desenvolupar-se mitjançant un Reglament de Transparència de la Societat, proposat per la Junta Directiva a l’Assemblea General per a la seua aprovació o modificació.
