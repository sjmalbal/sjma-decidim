  Article 4. Interés General:
  - kind: modification
    summary: >-
      Justificació: manté el principi d'interés general i d'obertura de les activitats a la ciutadania, però elimina una formulació
      massa absoluta que podia impedir beneficis, condicions o bonificacions legítimes per a Persones Associades, Joventuts
      o altres persones vinculades a la Societat.
    old_text: |-
      Articulo 4. Interés General.- Todas las actividades estarán abiertas a los ciudadanos ef general. Los destinatarios de las actividades que se realicen, para el cumplimiento de los fines de

      esta Asociación, serán todos los vecinos, y no quedarán restringidas exclusivamente a beneficiar A sus asociados. Los fundadores y asociados no gozarán de condiciones especiales para beneficiarse de sus actividades y servicios.
    draft_text: |-
      Totes les activitats de la Societat estan obertes a la ciutadania en general. Les activitats realitzades per la Societat per a l’acompliment dels seus fins es destinaran a tot el poble d’Albal i no quedaran restringides exclusivament al benefici de les seues Persones Associades.

      Això s’entén sense perjudici dels drets de participació, condicions, beneficis o bonificacions que puguen correspondre legítimament a les Persones Associades, a les Joventuts o a altres persones en supòsits objectius aprovats per l’òrgan competent, d’acord amb aquests Estatuts, els reglaments interns i els acords dels òrgans competents.
