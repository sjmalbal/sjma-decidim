      La Societat es dissoldrà per les següents causes:

      a) Per Acord de l’Assemblea General, convocada expressament amb aquesta finalitat, amb el vot favorable de la majoria absoluta de l’Assemblea General.

      b) Per reducció del nombre de Persones Associades a menys de tres.

      c) Per les causes previstes en aquestos Estatuts.

      d) Per les causes determinades a l’article 39 del Codi Civil i la resta de normativa aplicable.

      e) Per sentència judicial ferma.
