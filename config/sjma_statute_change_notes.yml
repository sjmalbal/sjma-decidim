      Presidència de la Junta Directiva

      individualment per al càrrec de la Presidència de la Junta Directiva en un termini de 12 dies després de la convocatòria de l’Assemblea en que s’hi vaja a celebrar l’elecció, mitjançant escrit presentat a la Junta Directiva en aquell moment i publicat al Tauler d’Anuncis de la Societat i, facultativament, en els demés mitjans de publicitat de la Societat. En aquest escrit, figurarà la persona que es presente a la Presidència i el llistat de persones que proposarà per a formar part de la Junta Directiva amb els respectius càrrecs als que optaran.

      En cas que no s’hi presentara cap candidatura en aquest termini, podran presentar-se a la mateixa sessió de l’Assemblea mitjançant l’escrit descrit presentat a la Mesa de l’Assemblea.

      c) Abans d’efectuar la votació, les candidatures exposaran les seues propostes i projectes per a la Societat. A més, hauran de presentar a totes les persones que proposen per a ser designades com a components de la nova Junta Directiva i els seus respectius càrrecs. A partir d’aquestos punts, podran debatre i confrontar posicions amb les restants candidatures.

      Correspondrà a la Persona Associada de major edat present en la sessió moderar les intervencions i el debat, per al qual passarà a formar part de la Mesa de l’Assemblea General com a Moderador. En cas que aquesta Persona Associada haguera presentat també candidatura a la Presidència de la Junta Directiva, exercirà la funció de Moderador la següent Persona Associada de més edat, i així successivament.

      d) Quan només es presentara una única candidatura, la Presidència de la Junta Directiva podrà ser escollida en votació ordinària per braços alçats, sempre i quan cap Persona Associada present a la sessió es mostre contrària a aquest procediment de votació, cas en el qual es farà votació secreta per papereta. Quan hi haguera més d’una candidatura, la Presidència serà escollida sempre en votació secreta per papereta.

      a la Presidència de la Junta Directiva.

      e) Serà escollida la candidatura que aconseguisca la majoria absoluta dels vots de les Persones Associades presents o representades. Si cap candidatura aconseguira aquesta majoria, es durà a terme una segona votació en la que resultarà escollida la candidatura que aconseguisca la majoria simple.

      f) Les Persones Associades podran delegar el seu dret de votació en les eleccions a la Presidència de la Junta Directiva en altra Persona Associada representant en els termes previstos en aquestos Estatuts. Si així ho decideixen, podran assenyalar el sentit del seu vot per la candidatura que estimen en el document d’autorització de la seua representació o en una papereta confeccionada per la persona representada.

      g) La Presidència de la Junta Directiva electa designarà en la mateixa sessió de l’Assemblea General a la resta de components de la nova Junta Directiva.
