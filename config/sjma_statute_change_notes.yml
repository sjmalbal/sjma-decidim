      Artículo 27.- El procedimiento electoral se regirá por las siguientes normas:

      a) Serán electores todos los socios numerarios mayores de edad, que no hayan sido privados del derecho de votación por procedimiento legal o estatutario.

      b) En la convocatoria de la Asamblea General en la que deba celebrarse la votación se indicarán los cargos vacantes que han de ser elegidos.

      e) Las candidaturas podrán presentarse de manera individual o conjunta, pero en ambos casos serán abiertas. Cada candidato optará a un cargo determinado.

      d) Se confeccionarán papeletas de votación, en las que figurarán manuscritos, Y | mecanografiados, en imprenta o fotocopiados los nombres y apellidos de cada uno de los NY candidatos y el cargo para el que se proponen.

