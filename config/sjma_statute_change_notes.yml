  Article 29. De l’elecció de la Junta Directiva:
  - kind: modification
    summary: 'Justificació: adapta el funcionament de la Junta Directiva a una estructura més clara, flexible i responsable.'
    old_text: |-
      Artículo 27.- El procedimiento electoral se regirá por las siguientes normas:

      a) Serán electores todos los socios numerarios mayores de edad, que no hayan sido privados del derecho de votación por procedimiento legal o estatutario.

      b) En la convocatoria de la Asamblea General en la que deba celebrarse la votación se indicarán los cargos vacantes que han de ser elegidos.

      e) Las candidaturas podrán presentarse de manera individual o conjunta, pero en ambos casos serán abiertas. Cada candidato optará a un cargo determinado.

      d) Se confeccionarán papeletas de votación, en las que figurarán manuscritos, Y | mecanografiados, en imprenta o fotocopiados los nombres y apellidos de cada uno de los NY candidatos y el cargo para el que se proponen.

      e) Las presentes normas básicas de carácter electoral podrán desarrollarse Du reglamentariamente, si fuese conveniente, por acuerdo adoptado en Asamblea General. a " . . 7 . . .
    draft_text: |-
      1. La Junta Directiva serà escollida per l’Assemblea General mitjançant candidatures completes en llista tancada, d’acord amb el que establixen aquestos Estatuts.

      2. El procediment electoral per a triar la Junta Directiva es regirà per les següents normes:

      A l’efecte de participar en les eleccions internes, només formaran part del cens electoral les persones que hagueren adquirit la condició de Persona Associada abans de la data de convocatòria de les eleccions.

      b) Les candidatures es presentaran com a llistes tancades a la Junta Directiva en el termini de 7 dies naturals comptats des de l’endemà de la convocatòria de l’Assemblea en què s’hi vaja a celebrar l’elecció, mitjançant escrit presentat a la Junta Directiva, per correu electrònic, formulari electrònic o altres canals habilitats per la Societat.

      En aquest escrit haurà de figurar la relació completa de persones que integren la candidatura i el càrrec que desenvoluparà cadascuna dins de la Junta Directiva.

      En cap cas es tractarà d’una llista oberta ni d’una elecció separada per càrrecs, de manera que el vot recaurà sobre la candidatura completa a la Junta Directiva.

      El dia natural següent a la finalització del termini de presentació, la Junta Directiva farà publicitat de les candidatures presentades al Tauler d’Anuncis de la Societat, per correu electrònic i pels altres canals habituals de comunicació de la Societat.

      Entre la publicació de les candidatures i la sessió de l’Assemblea en què s’haja de votar hauran de transcórrer, almenys, 7 dies naturals, perquè les Persones Associades que formen part del cens electoral puguen conèixer les candidatures i formar el seu criteri de vot.

      c) Abans d’efectuar la votació, les candidatures exposaran les seues propostes i projectes per a la Societat. A més, hauran de presentar totes les persones que integren la candidatura i els càrrecs que desenvoluparan. A partir d’aquestos punts, podran debatre i confrontar posicions amb les restants candidatures.

      Correspondrà a la Persona Associada de major edat present en la sessió moderar les intervencions i el debat, per al qual passarà a formar part de la Mesa de l’Assemblea General com a Moderador. En cas que aquesta Persona Associada integrara també una candidatura a la Junta Directiva, exercirà la funció de Moderador la següent Persona Associada de més edat, i així successivament.

      d) Quan només es presentara una única candidatura, la Junta Directiva podrà ser escollida en votació ordinària per braços alçats, sempre i quan cap Persona Associada present a la sessió es mostre contrària a aquest procediment de votació, cas en el qual es farà votació secreta per papereta. Quan hi haguera més d’una candidatura, l’elecció es farà sempre en votació secreta per papereta.

      En els casos en què es fera votació secreta per papereta, es confeccionaran paperetes de votació, en les quals figuraran manuscrits, mecanografiats, en impremta o fotocopiats els noms i cognoms de cadascuna de les candidatures a la Junta Directiva.

      e) Serà escollida la candidatura a la Junta Directiva que aconseguisca la majoria qualificada dels vots de les Persones Associades presents o representades. Si cap candidatura aconseguira aquesta majoria, es durà a terme una segona votació en la que resultarà escollida la candidatura que aconseguisca la majoria simple.

      f) Les Persones Associades podran delegar el seu dret de votació en les eleccions a la Junta Directiva en altra Persona Associada representant en els termes previstos en aquestos Estatuts. L’autorització de la representació haurà de contindre únicament les dades exigides amb caràcter general per a la delegació de veu i vot, sense indicar el sentit del vot de la persona representada.

      En les votacions secretes per papereta, la Persona Associada representant podrà dipositar la seua papereta i les paperetes corresponents a les Persones Associades que represente, preservant en tot cas el caràcter secret del vot.

      g) La candidatura a la Junta Directiva que resulte escollida assumirà els càrrecs que consten en la llista tancada presentada, sense necessitat de designació posterior per part de la Presidència.
