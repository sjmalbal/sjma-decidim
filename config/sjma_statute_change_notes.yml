      a) La falta de consideració i respecte cap als càrrecs socials i direccions tècnic-artístiques i la desobediència lleu a les seues Resolucions i la falta de cooperació en la tasca de la Societat.

      b) La negligència excusable o simple negligència en l’acompliment de les funcions i obligacions socials d’acord amb aquestos Estatuts.

      c) Causar danys per negligència a les coses, útils, estris i demés pertinències de la Societat.
