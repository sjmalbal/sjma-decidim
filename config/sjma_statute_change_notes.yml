  Article 83. De les faltes molt greus:
  - kind: addition
    summary: >-
      Justificació: defineix les faltes greus i diferencia millor la desobediència, els altercats, la falta de respecte, el
      perjudici a la convivència, els impagaments, l'acumulació de faltes lleus fermes no prescrites i els incompliments greus
      en Escola, agrupacions, activitats, béns, canals i funcions encomanades.
    old_text: ''
    draft_text: |-
      Són faltes molt greus:

      a) Els actes o omissions vinculats a la Societat, a les seues activitats o a l’exercici dels drets i deures socials que pogueren constituir infracció penal qualificada com a delicte.

      b) L’actuació deshonesta o la falta de probitat en la custòdia, administració, gestió o recaptació dels fons socials o dels béns confiats per raó del càrrec o de la funció exercida.

      c) La desobediència greu als Acords i Resolucions dels òrgans de govern i de representació de la Societat, en l’àmbit de les seues competències i en l’exercici de les seues funcions.

      d) Pel que fa a les persones que formen part de la Junta Directiva, l’incompliment dolós de les disposicions estatutàries o dels Acords de l’Assemblea General.

      e) Causar dolosament danys o pèrdues als béns, materials, instal·lacions, instruments o altres pertinences de la Societat.

      f) L’impagament reiterat de les quotes, derrames o altres obligacions econòmiques aprovades per l’Assemblea General durant dos exercicis consecutius, quan haja existit requeriment previ de pagament i no s’haja regularitzat la situació ni comunicat la voluntat de causar baixa.

      g) La comissió de tres faltes greus no prescrites, sempre que les anteriors hagen sigut declarades per resolució disciplinària ferma.

      h) L’assetjament, agressió, intimidació, discriminació, vexació o qualsevol conducta que atempte greument contra la dignitat, integritat, llibertat o seguretat de les persones, especialment quan afecte persones menors d’edat o persones en situació de vulnerabilitat.

      i) L’accés no autoritzat, ús indegut greu, alteració, destrucció, ocultació o difusió indeguda de dades personals, documents, registres, credencials, sistemes d’informació o altres recursos digitals de la Societat, quan cause o puga causar un perjudici greu a la Societat o a terceres persones.

      j) L’apropiació, retenció injustificada, cessió a terceres persones, no devolució o ús no autoritzat d’instruments, material, uniformes, documents, claus, credencials, instal·lacions o altres béns de la Societat, quan cause o puga causar un perjudici greu.

      k) L’incompliment greu dels deures de confidencialitat, imparcialitat, abstenció per conflicte d’interés, custòdia, documentació o rendició de comptes per part de persones que exercisquen càrrecs, funcions delegades o responsabilitats encomanades per la Societat.
