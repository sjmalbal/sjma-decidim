      2. Per Resolució de la Junta Directiva, escoltada la Direcció tècnic-artística, podrà ampliar-se el nombre de Persones Delegades fins a un màxim de tres persones majors d’edat, atenent al nombre de persones integrants actives, al volum d’activitat i a les necessitats organitzatives de l’Agrupació.

      3. Quan una Agrupació Artística Titular compte amb una presència significativa de persones menors d’edat, la Junta Directiva podrà acordar, escoltada la Direcció tècnic-artística, que s’escullen una o dues Persones Delegades Junior entre les persones integrants actives majors de 15 anys i menors d’edat.

      4. Les Persones Delegades Junior tindran com a funció principal traslladar la visió, opinions, preferències, inquietuds i forma de pensar de les persones menors d’edat de l’Agrupació. Participaran en les funcions de comunicació, coordinació i proposta d’acord amb la seua edat i capacitat, sense assumir funcions de representació legal ni responsabilitats reservades a persones majors d’edat.

      5. Correspon a les Persones Delegades:

      a) Facilitar la comunicació interna de l’Agrupació.

      b) Coordinar, amb el suport i l’aprovació de la Direcció tècnic-artística i de la Junta Directiva quan corresponga, les activitats, concerts, desplaçaments i projectes especials de l’Agrupació.

      c) Donar suport a la Direcció tècnic-artística en assumptes artístics, organitzatius i socials de l’Agrupació, inclosa la detecció de necessitats de les diferents seccions i la millora de la seua dinàmica interna.

      d) Representar en la Comissió Mixta d’Agrupacions la visió general de l’Agrupació, traslladant-hi les seues propostes, necessitats, inquietuds, projectes i incidències, així com aquells assumptes que resulten rellevants per a la coordinació general de la Societat.

      e) Contribuir a mantindre un bon clima humà, de treball i de convivència dins de l’Agrupació.

      f) Les altres funcions que els atribuïsquen aquests Estatuts o les normes internes de la Societat.
