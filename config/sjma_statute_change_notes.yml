      Artículo 26.- Duración de los cargos directivos.- La duración en el ejercicio del cargo de

      todos los miembros de la Junta Directiva será de . 4. años, computados desde la fecha de su elección hasta la sesión de la Asamblea General que corresponda a la terminación de su mandato. Todos ellos podrán ser reelegidos por periodos iguales. El cese en el cargo antes de extinguirse el término reglamentario podrá deberse a:

      a) Dimisión voluntaria presentada mediante un escrito en el que se razonen los motivos.

      b) Enfermedad que incapacite para el ejercicio del cargo.

      c) Causar baja como miembro de la Asociación.

      d) Sanción impuesta por una falta cometida en el ejercicio del cargo. Las vacantes que se produzcan en la Junta Directiva se cubrirán en la primera Asamblea General que se celebre. No obstante, la Junta Directiva podrá nombrar, provisionalmente, hasta la próxima Asamblea General, al socio que estime conveniente para el cargo vacante hasta la mencionada Asamblea General.

      e) Cuando en las elecciones a Junta Directiva no se presentaren candidatos para todos los cargos, la Junta electa quedará facultada para designar los cargos vacantes de modo provisional hasta la siguiente Junta General.
