  Article 106. De la liquidació:
  - kind: addition
    summary: 'Justificació: ordena el règim econòmic, patrimonial, pressupostari i de rendició de comptes.'
    old_text: ''
    draft_text: |-
      1. Una vegada acordada o declarada la dissolució, s’obrirà el període de liquidació, durant el qual la Societat conservarà la seua personalitat jurídica fins a la finalització de les operacions de liquidació i la cancel·lació dels assentaments registrals.

      2. L’Assemblea General podrà designar una Comissió Liquidadora. Si no la designara, actuaran com a persones liquidadores les persones que componguen la Junta Directiva en el moment de la dissolució, llevat que l’Assemblea General o l’autoritat judicial competent acorde altra cosa.

      3. Correspon a les persones liquidadores:

      a) Vetlar per la integritat del patrimoni de la Societat i portar-ne els comptes.

      b) Concloure les operacions pendents i efectuar les noves que siguen necessàries per a la liquidació.

      c) Cobrar els crèdits de la Societat.

      d) Liquidar el patrimoni i pagar les persones creditores.

      e) Aplicar els béns sobrants de la Societat al destí previst en aquestos Estatuts i en la normativa vigent aplicable.

      f) Sol·licitar la cancel·lació dels assentaments del Registre d’Associacions.

      4. El romanent net que resulte de la liquidació, si n’hi haguera, es destinarà a entitats sense ànim de lucre o entitats públiques que perseguisquen finalitats culturals, musicals, educatives, socials o d’interés general anàlogues a les de la Societat, preferentment vinculades al municipi d’Albal o al moviment associatiu musical valencià, d’acord amb el que determine l’Assemblea General i amb respecte a la normativa vigent aplicable.

      5. En cap cas el romanent podrà repartir-se entre les Persones Associades ni entre persones físiques o jurídiques amb interés lucratiu.

      6. En cas d’insolvència de la Societat, la Junta Directiva, la Comissió Liquidadora o les persones liquidadores promouran immediatament el procediment que corresponga davant l’òrgan competent.
