  Article 10. De les Persones Associades i les Joventuts:
  - kind: modification
    summary: >-
      Justificació: simplifica les classes de socis i adapta la terminologia al model del nou esborrany: els antics Socis
      Numeraris passen a regular-se com a Persones Associades i els antics Socis Juvenils passen a integrar-se en les Joventuts.
      També separa el règim de les Joventuts del de l'alumnat menor no associat de l'Escola, precisa que no tenen vot en l'Assemblea
      General ni en els òrgans de govern, sense impedir la seua participació interna en les Agrupacions quan els Estatuts
      ho preveuen, evita que el pas a Persona Associada siga automàtic en arribar a la majoria d'edat i vincula la continuïtat
      com a integrant activa major d'edat d'una Agrupació Artística Titular a la condició de Persona Associada.
    old_text: |-
      Articulo 8.- Los socios podrán ser: Numerarios, Juveniles, Honorarios, y Protectores.

      Articulo 9.- Serán Socios Numerarios o de pleno derecho, las personas fisicas mayores de edad, que no estén sujetas a ninguna condición legal para el ejercicio de sus derechos, que tengan interés en el desarrollo de los fines de la Asociación, amantes de la música y de la convivencia social, y que se inscriban como tales y satisfagan las correspondientes cuotas sociales. Las personas jurídicas serán socios numerarios previo acuerdo expreso de su órgano competente. Los socios numerarios se relacionarán en un Libro Registro de Socios, por riguroso orden de antiguedad.

      Artículo 10.- Serán Socios Juveniles, los que no alcanzando la mayoría de edad, ni la emancipación, se integren en la sección juvenil correspondiente. Se requerirá autorización o consentimiento del padre o persona que tenga la patria potestad o tutela, o que supla su capacidad. Los Socios Juveniles no tendrán voto ni podrán acceder a cargos directivos hasta que alcancen la mayoría de edad y tengan la plena capacidad de obrar.
    draft_text: |-
      1. Són Persones Associades les persones inscrites en la Societat com a sòcies de ple dret, amb interés pel desenvolupament dels fins de la Societat, la música i la convivència social.

      Podran associar-se les persones físiques majors d’edat i les persones jurídiques sense ànim de lucre, en aquest últim cas previ acord exprés del seu òrgan competent, que, en ambdós casos, no estiguen subjectes a cap condició legal per a l’exercici dels seus drets.

      2. Aquelles persones que, no havent assolit la majoria d’edat ni l’emancipació, s’integren en alguna Agrupació Artística Titular o participen en activitats de la Societat amb vinculació associativa, conformaran les Joventuts.

      Per a la seua inclusió a les Joventuts es requerirà l’autorització o consentiment de la persona o les persones que tinguen la pàtria potestat o tutela o que suplisquen la seua capacitat, i que aquesta o alguna d’aquestes estiga inscrita com a Persona Associada a la Societat.

      L’alumnat menor d’edat de l’Escola que no tinga aquesta vinculació associativa es regirà pel règim propi de l’Escola i per l’autorització o consentiment de les persones que n’exercisquen la representació legal, sense necessitat que aquestes tinguen la condició de Persona Associada.

      3. Les persones que conformen les Joventuts no tindran dret de vot en l’Assemblea General ni en els òrgans de govern de la Societat, ni podran accedir a càrrecs directius. En assolir la majoria d’edat i tindre plena capacitat d’obrar, podran sol·licitar la seua incorporació com a Persones Associades. La continuïtat com a persona integrant activa major d’edat d’una Agrupació Artística Titular requerirà tindre la condició de Persona Associada, d’acord amb aquests Estatuts.

      4. La condició de Persona Associada és intransmissible.
