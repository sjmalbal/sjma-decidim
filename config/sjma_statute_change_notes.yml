      3. Quan una Agrupació Artística Titular compte amb una presència significativa de persones menors d’edat, la Junta Directiva podrà acordar, escoltada la Direcció tècnic-artística, que s’escullen una o dues Persones Delegades júnior entre les persones integrants actives majors de 15 anys i menors d’edat.

