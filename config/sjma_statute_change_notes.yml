      Artículo 28.- Quorum y acuerdos.- La Junta Directiva quedará validamente constituida, con 5 : —— convocatoria previa,
      cuando asista la mitad más uno de sus miembros, se reunirá cuantas veces sea ? Y convocada por el Presidente y con la
