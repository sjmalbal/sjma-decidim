  Article 13. De la sol·licitud d’ingrés:
  - kind: modification
    summary: >-
      Justificació: actualitza el procediment d'ingrés perquè la sol·licitud puga presentar-se pels canals habilitats per
      la Societat, amplia el termini de publicitat a un mes amb dades mínimes d'identificació social i sense publicar dades
      de contacte o identificatives innecessàries, preveu l'alta automàtica si no hi ha denegació o suspensió motivada, remet
      la denegació al règim de revisió interna i sotmet les altes a ratificació posterior de l'Assemblea General com a control
      de regularitat.
    old_text: |-
      Articulo 12.- Solicitud de ingreso.- Quienes deseen ingresar en la Asociación deberán solicitarlo por escrito. Se dará publicidad a la petición por plazo de diez días, transcurridos los cuales y a la vista de las posibles impugnaciones la Junta Directiva resolverá respecto de la admisión solicitada dentro del plazo máximo de tres meses; contra su decisión cabe recurso de alzada ante la Asamblea General.

      Articulo 13.- Durante los tres meses anteriores a la fecha de celebración de elecciones internas para cargos de la Junta Directiva, no se adoptará decisión alguna sobre la admisión de nuevos socios, por lo que las solicitudes de ingreso que se produzcan quedarán en suspenso hasta la efectiva celebración de las elecciones, a los efectos de que los solicitantes carezcan de voz y voto en los comicios que se convoquen durante aquel señalado periodo.
    draft_text: |-
      1. Les persones físiques o jurídiques que desitgen ingressar en la Societat com a Persones Associades hauran de sol·licitar-ho per escrit, mitjançant correu electrònic, formulari electrònic o altres canals habilitats per la Societat, dirigint la sol·licitud a la Junta Directiva.

      2. Es donarà publicitat interna a la petició, amb el nom i cognoms o denominació de la persona sol·licitant i, si escau, qualsevol altra identificació social estrictament necessària per a evitar confusions, durant el termini d’un mes, durant el qual podran presentar-se al·legacions. No es publicaran dades identificatives, de contacte o altres dades personals que no siguen necessàries per a aquesta finalitat. Transcorregut aquest termini, la persona sol·licitant passarà a integrar-se com a Persona Associada, llevat que la Junta Directiva haja comunicat motivadament la denegació de l’admissió o la suspensió de la decisió per causa justificada.

      3. La suspensió no podrà excedir d’un mes addicional. Transcorregut aquest termini sense denegació motivada, la persona sol·licitant passarà a integrar-se com a Persona Associada.

      4. La denegació de l’admissió podrà ser objecte de revisió interna en els termes previstos en l’article 78 d’aquestos Estatuts, sense perjudici de les accions d’impugnació que corresponguen davant l’ordre jurisdiccional civil.

      5. Les altes produïdes seran informades i sotmeses a ratificació en la següent Assemblea General ordinària. La ratificació tindrà efectes de control de regularitat i no suspendrà per si mateixa la condició de Persona Associada ja adquirida, sense perjudici que, si s’apreciara incompliment dels requisits estatutaris, es tramite la revisió o baixa que corresponga amb les garanties previstes en aquests Estatuts.
    old_article_refs:
