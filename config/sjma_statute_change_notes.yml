      Articulo 25.- Composición.- La Junta Directiva es el órgano permanente de gobierno, gestión y administración de la Asociación. Estará formada por: Presidente, Vicepresidente, Secretario, Vicesecretario, Tesorero y un número de Vocales, no inferior a 3 ni superior a 7. La Junta Directiva designará la persona que ostente el cargo de Ajustador de la Banda, que si recae en persona que no forme parte de su seno, podrá asistir a la Junta con voz y sin voto. Podrá también designar asesores técnicos y artísticos para que formen parte de la Junta Directiva con voz y sin voto. Los miembros de la Junta Directiva, de pleno derecho, con voz y voto, ejercerán su cargo gratuitamente, sin que en ningún caso puedan percibir retribución por el desempeño de su función.

      No obstante tendrán derecho a ser reembolsados por los gastos justificados que el desempeño de su función les ocasione.

      Artículo 27.- El procedimiento electoral se regirá por las siguientes normas:

