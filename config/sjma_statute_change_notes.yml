  Article 9. De les demés maneres de participació i col·laboració amb la Societat:
  - kind: modification
    summary: >-
      Justificació: substitueix les categories antigues de Socis Honoraris i Socis Protectors per un sistema més flexible:
      els reconeixements honorífics passen a ser Mencions d'Honor que es poden atorgar a persones associades o no associades,
      i la col·laboració especial dels antics protectors passa a articular-se mitjançant convenis de col·laboració, protecció,
      patrocini o mecenatge amb persones físiques o jurídiques.
    old_text: >-
      Articulo 11.- Serán Socios Honorarios aquellos que por sus méritos o cualidades personales o por los servicios prestados
      a la Sociedad, merezcan esta distinción que será otorgada por la Asamblea General a propuesta de la Junta Directiva.
      Serán Socios Protectores los que, con tal carácter lo soliciten de la Asociación contribuyendo al sostenimiento material
      de la misma, sin tomar parte en la vida activa de la Entidad. Los Socios Honorarios y Protectores no podrán ser electores
      ni elegibles, y carecerán de voto en las Asambleas Generales de la Asociación.
    draft_text: |-
      1. Estiguen associades o no a aquesta, la Societat podrà reconèixer a totes aquelles persones que pels seus mèrits o qualitats personals o pels serveis prestats a la Societat mitjançant Menció d’Honor, atorgada per acord de l’Assemblea General a proposta de la Junta Directiva.

      2. Estiguen associades o no a aquesta, la Societat podrà establir convenis de col·laboració o rebre la protecció, patrocini o mecenatge d’altres persones físiques o jurídiques públiques o privades.
