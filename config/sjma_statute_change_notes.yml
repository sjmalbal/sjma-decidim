  Article 49. De les Persones Delegades i la seua elecció:
  - kind: addition
    summary: >-
      Justificació: introdueix Persones Delegades per coordinar millor les agrupacions artístiques i canalitzar la relació
      amb la Direcció i la Junta Directiva.
    old_text: ''
    draft_text: |-
      1. D’entre les persones que componen cadascuna de les distintes agrupacions artístiques i unitats culturals de la Societat es triarà a 3 Persones Delegades per a cada agrupació o unitat.

      2. Les Persones Delegades ho seran per a un període de 3 exercicis artístics. En el cas de la Banda Simfònica, seran escollides en reunió de l’Assemblea de Músics convocada a l’efecte una vegada finalitze el període esmentat. En el cas de les restants agrupacions artístiques o unitats culturals de la Societat, seran escollides al primer assaig general de l’exercici artístic que corresponga.

      3. Quan es produïren vacants per dimissió, incapacitat o pèrdua de la condició de Persona Associada entre les Persones Delegades de la Banda Simfònica, aquestes vacants seran cobertes en una Assemblea de Músics convocada a tal efecte i en votació secreta per papereta. En el cas de les restants agrupacions artístiques o unitats culturals de la Societat, aquestes seran cobertes al primer assaig general posterior a quan es produïra la vacant mitjançant votació ordinària per braços alçats d’entre les persones assistents i, subsidiàriament, per alguna persona d’entre les que componen la Junta Directiva a designació per la Presidència. Les Persones Delegades que cobrisquen aquestes vacants ho seran pel temps que reste a les altres Persones Delegades que ho foren en eixe moment.
