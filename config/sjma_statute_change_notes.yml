      1. Les persones que componen la Banda Simfònica de la Societat podran constituir una Assemblea de Músics. Serà l’òrgan de representació dels músics de cada agrupació artística per a recollir i fer valdre els seus interessos front als òrgans de govern i de representació de la Societat.

      2. Estaran compostes pels músics actius de la Banda Simfònica en el moment en què s’hi constituïsca. Tots comptaran amb dret a veu per a pronunciar-se als debats i deliberacions que s’hi duguen a terme i amb dret a vot en els Dictàmens que emeten.

