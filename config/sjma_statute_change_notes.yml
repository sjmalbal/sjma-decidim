  Article 85. De les sancions per faltes lleus:
  - kind: addition
    summary: 'Justificació: concreta les sancions per faltes lleus.'
    old_text: ''
    draft_text: |-
      Per raó de les faltes lleus comeses es podran imposar les següents sancions:

      a) Suspensió dels drets corresponents a les Persones Associades des d’un dia fins a un mes.

      b) Advertència.
    old_article_refs: []
  Article 86. De la graduació de les sancions:
  - kind: addition
    summary: 'Justificació: afegeix criteris de graduació perquè les sancions siguen proporcionades a cada cas.'
    old_text: ''
    draft_text: >-
      En la imposició de les sancions es guardarà la deguda adequació entre la gravetat del fet constitutiu de la falta i
      la sanció aplicada, podent-se inclús acumular més d’una sanció per a una mateixa falta. Es consideraran en especial
      per a la graduació de la sanció l’existència d’intencionalitat o reiteració, la naturalesa dels perjuís ocasionats i
      la reincidència per comissió en el termini d’un any de més d’una infracció de la mateixa naturalesa quan haja estat
      castigada per expedient resolt.
    old_article_refs: []
  Article 87. De la prescripció de les faltes i sancions:
  - kind: addition
    summary: 'Justificació: regula la prescripció de faltes i sancions per donar seguretat temporal al règim disciplinari.'
    old_text: ''
    draft_text: |-
      1. Les faltes prescriuen d’acord amb les següents condicions:

      a) Les molt greus, 1 any després de la data de la seua comissió.

      b) Les greus, 6 mesos després de la data de la seua comissió.

      c) Les lleus, 3 mesos després de la data de la seua comissió.

      2. La imposició de les sancions prescriurà d’acord amb les següents condicions:

      a) Les que corresponguen a les faltes molt greus, 6 mesos després de la data de la finalització del corresponent expedient.

      b) Les que corresponguen a les faltes greus, 3 mesos després de la data de la finalització del corresponent expedient.

      c) Les que corresponguen a les faltes lleus, 1 mes després de la data de la finalització del corresponent expedient.
    old_article_refs: []
  Article 88. Del règim disciplinari per a les persones que composen la Junta Directiva:
  - kind: addition
    summary: >-
      Justificació: estableix un règim específic per a les persones que composen la Junta Directiva, atenent a la seua responsabilitat
      orgànica.
    old_text: ''
    draft_text: |-
      1. Només podrà obrir-se expedient disciplinari front a les persones que composen la Junta Directiva quan així ho acorde l’Assemblea General per majoria absoluta d’entre les persones assistents a la sessió.

      2. Quan es fera front a les persones que ocupen els càrrecs distints a la Presidència i la Secretaria, l’apertura d’expedient disciplinari comportarà el seu cessament per part de la Presidència de la Junta Directiva i el seguiment del procediment ordinari establert reglamentàriament.

      3. Quan es fera front a les persones que ocupen els càrrecs de la Presidència o la Secretaria, l’expedient serà instruït per una Comissió Instructora designada per majoria absoluta en la sessió de l’Assemblea General en que s’acordara l’apertura de l’expedient d’entre les Persones Associades assistents a la sessió. Correspondrà la resolució de l’expedient a l’Assemblea General per majoria qualificada d’un mínim de 3 cinquenes parts d’entre les persones assistents a la sessió.
    old_article_refs: []
