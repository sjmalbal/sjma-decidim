  Article 74. Del Bon Govern de la Societat:
  - kind: addition
    summary: 'Justificació: afegeix principis de bon govern per orientar la gestió interna i prevenir conflictes d''interés.'
    old_text: ''
    draft_text: |-
      1. Els òrgans de govern i de representació actuaran amb respecte a la legalitat vigent i d’acord amb els principis d’eficiència, modernització, sostenibilitat i bon servei a les Persones Associades, defensant els interessos socials amb honestedat, objectivitat, imparcialitat, confidencialitat, austeritat i proximitat. Així mateix, fomentaran la participació, la igualtat d’oportunitats i la solidaritat entre les Persones Associades.

      2. Les persones que componen els òrgans de govern i de representació de la Societat utilitzaran un to respectuós i deferent en les seues intervencions tant cap a la resta de components d’aquestos com cap a les demés Persones Associades, a les quals facilitaran l’exercici dels seus drets i l’acompliment de les seues obligacions, i el públic en general.

      3. Les persones que componen els òrgans de govern i de representació de la Societat s’abstindran d’exercir les seues funcions o d’utilitzar les seues prerrogatives per a afavorir interessos privats, propis o de terceres persones, sense que en cap cas càpiga cap tipus de favoritisme ni d’exercici de l’autoritat en profit propi.

      4. Es crearan mecanismes per a possibilitar la formulació de Suggerències, Queixes i Felicitacions per part de les Persones Associades i es vetlarà per donar-los resposta diligent i adient.

      5. Les persones que componen la Junta Directiva promouran la resolució dels conflictes que sorgisquen entre les Persones Associades al si de la Societat. Podrà desenvolupar-se un Reglament d’Arbitratge i Resolució de conflictes que la regule.

      6. Les previsions d’aquest article podran desenvolupar-se mitjançant un Codi de Bon Govern de la Societat, proposat per la Junta Directiva a l’Assemblea General per a la seua aprovació o, en cas d’haver-ne, modificació.
