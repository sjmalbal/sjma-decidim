      6ª.- Por cualquier otra causa prevista en las leyes.

      El acuerdo de expulsión o separación será adoptado por la Junta Directiva, en resolución motivada, que será notificada por escrito al sancionado, previo expediente disciplinario y audiencia del interesado.

      Contra el acuerdo, en el plazo de 15 días podrá recurrirse en alzada ante la primera Asamblea General que se celebre, en cuya alzada la Asamblea adoptará la resolución procedente que tendrá carácter definitivo. Desde la notificación del acuerdo de expulsión adoptado por la Junta Directiva hasta la resolución definitiva de la Asamblea General, cuando se hubiese interpuesto el recurso de alzada, la condición de socio del afectado quedará en suspenso, así como los derechos y deberes derivados de dicha condición.
    draft_text: |-
      1. Les persones que formen part de la Junta Directiva estaran sotmeses al règim disciplinari general previst en aquestos Estatuts pels fets comesos com a Persones Associades o en l’exercici del càrrec.

      2. L’obertura d’un expedient disciplinari contra una persona que forme part de la Junta Directiva haurà de ser acordada per l’Assemblea General per majoria qualificada, amb identificació suficient dels fets que motiven l’expedient.

      3. En aquests supòsits s’aplicarà el règim d’abstenció previst en l’article 77 d’aquestos Estatuts, especialment respecte de la deliberació i votació dels Acords d’obertura, suspensió cautelar i resolució de l’expedient.

      4. En el mateix acord d’obertura, l’Assemblea General designarà una Comissió Instructora formada per tres Persones Associades majors d’edat, en ple exercici dels seus drets socials, que no formen part de la Junta Directiva, no estiguen afectades pels fets objecte de l’expedient i no tinguen conflicte d’interés.

      5. Les persones membres de la Comissió Instructora podran ser proposades per qualsevol Persona Associada amb dret a vot en la mateixa sessió de l’Assemblea General. Si no hi haguera prou persones candidates voluntàries, les places vacants es cobriran per sorteig entre les Persones Associades que complisquen els requisits previstos en aquest article.

      6. Les persones designades per sorteig hauran d’acceptar la designació, llevat que al·leguen causa justificada d’impossibilitat, conflicte d’interés o altra circumstància que impedisca l’exercici imparcial de la funció. En cas de no acceptació justificada, es procedirà a una nova designació pel mateix sistema.

      7. Si no fora possible constituir la Comissió Instructora amb tres Persones Associades, l’Assemblea General podrà designar una persona instructora externa i independent, que assumirà les funcions d’instrucció de l’expedient.

      8. La Comissió Instructora, o la persona instructora externa si escau, tramitarà l’expedient amb audiència de la persona afectada i formularà una proposta de resolució motivada.

      9. La resolució de l’expedient correspondrà a l’Assemblea General per majoria qualificada.

      10. L’obertura de l’expedient no comportarà per si mateixa el cessament en el càrrec. No obstant això, l’Assemblea General podrà acordar motivadament la suspensió cautelar, total o parcial, de l’exercici del càrrec mentre es tramite l’expedient, quan siga necessari per a protegir l’interés de la Societat, la instrucció de l’expedient o els drets de les persones afectades. Aquesta suspensió cautelar no tindrà caràcter sancionador.

      11. Quan l’expedient afecte la Presidència o la Secretaria, aquestes persones no podran dirigir, documentar ni certificar els punts, sessions o actuacions relacionades amb l’expedient. Aquestes funcions seran assumides per qui corresponga segons el règim de substitució previst en aquestos Estatuts o, si fora necessari, per la persona que designe l’Assemblea General.

      12. Les sancions imposades produiran els efectes que corresponguen sobre l’exercici del càrrec. Si comporten expulsió, inhabilitació o impossibilitat temporal d’exercir el càrrec, la vacant o suspensió es cobrirà d’acord amb el règim previst en aquestos Estatuts.

      13. Sense perjudici del que disposen els apartats anteriors, quan els fets exigisquen mesures immediates de protecció de persones, béns, documents, sistemes d’informació o interessos essencials de la Societat, la Junta Directiva, amb abstenció de les persones afectades o en conflicte d’interés, podrà adoptar les mesures provisionals urgents i imprescindibles de protecció o organització interna i convocar o sol·licitar la convocatòria de l’Assemblea General perquè decidisca sobre l’obertura de l’expedient i les mesures cautelars que corresponguen.
