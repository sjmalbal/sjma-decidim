  Article 42. De la responsabilitat de la Junta Directiva de la seua gestió front a l’Assemblea General:
  - kind: addition
    summary: >-
      Justificació: reforça la responsabilitat de la Junta Directiva davant l'Assemblea General i ordena el control polític
      de la seua gestió.
    old_text: ''
    draft_text: |-
      1. La Junta Directiva retrà comptes de la seua gestió i actuació davant de l’Assemblea General en els termes previstos en aquestos Estatuts.

      2. La Presidència, en nom de la Junta Directiva i prèvia deliberació d’aquesta en reunió, podrà plantejar davant l’Assemblea General en sessió ordinària un vot de confiança sobre la gestió i actuació de la Junta Directiva.

      La confiança s’entendrà atorgada quan vote a favor d’aquesta la majoria simple de les persones presents amb dret a vot. Si no s’atorga, s’entendrà revocada la confiança en la Junta Directiva i cessades totes les persones que la componen. La Junta Directiva cessada continuarà en funcions en règim d’interinitat fins que l’Assemblea General trie una nova Junta Directiva.

      3. L’Assemblea General podrà revocar en sessió extraordinària la confiança en la Junta Directiva mitjançant vot de censura. El vot de censura haurà de ser proposat per almenys un 10 per cent de les Persones Associades amb dret a vot i haurà d’incloure una candidatura completa de Junta Directiva en llista tancada.

      El vot de censura s’entendrà aprovat quan vote a favor d’aquest la majoria qualificada de les persones presents amb dret a vot. Si s’aprova, cessarà la Junta Directiva existent i quedarà escollida com a nova Junta Directiva la candidatura proposada en el vot de censura.
    old_article_refs: []
