articles:
  Article 3. De l’activitat i dels fins de la Societat:
  - kind: modification
    summary: >-
      Justificació: reubica en l'article dedicat a l'activitat i els fins de la Societat la declaració que ja figurava en
      l'article 2 anterior sobre la naturalesa cultural i l'absència d'ànim de lucre. Per tant, no és una previsió nova, sinó
      una reorganització sistemàtica del mateix contingut en el lloc més adequat.
    old_text: |-
      Articulo 3. Fines y actividades.- La Asociación tendrá por objeto o finalidad promover, 4 fomentar y difundir la música y la cultura, procurando la formación cultural de socios, vecinos y N ciudadanos en general , así como organizar y programar proyectos para la formación de la juventud y la educación integral de los jovenes; y en especial y principalmente mediante la enseñanza de la Música y la formación musical. A tales efectos realizará todas aquellas actividades que fomenten aspectos culturales, artísticos y recreativos, y de manera particular las siguientes:

      a) Con carácter prioritario la promoción y difusión del arte musical por medio de la Banda de Música, y de la Escuela de Música o de Educandos. Asimismo podrá crear orquestas, rondallas, orfeones y demás conjuntos musicales y corales y organizar conciertos, festivales, certámenes y audiciones de cualquier clase.

      b) La promoción y fomento de las artes plásticas y literarias mediante la programación de exposiciones, muestras, representaciones teatrales, cinematográficas, conferencias, seminarios y bibliotecas, etc.

      e) Proporcionará solaz y recreo de sus asociados mediante adecuadas actividades para el ocio y esparcimiento de estos.
    draft_text: |-
      Amb caràcter prioritari, la promoció i difusió de la música per mitjà de les Agrupacions artístiques, especialment de la Banda Simfònica, i de l'Escola. Podrà crear conjunts instrumentals i vocals de qualsevol tipus, i organitzar concerts, festivals, certàmens i audicions de qualsevol classe.

      La promoció i foment de les arts escèniques, plàstiques i literàries mitjançant la programació d'exposicions, mostres, representacions teatrals, cinematogràfiques, conferències, seminaris i biblioteques, etc. Podrà ampliar els ensenyaments de l'Escola a altres disciplines artístiques, especialment la dansa i les arts escèniques.
