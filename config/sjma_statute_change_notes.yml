  Article 92. Del procediment disciplinari:
  - kind: modification
    summary: 'Justificació: actualitza la responsabilitat patrimonial de la Societat i de les Persones Associades.'
    old_text: >-
      Artículo 57.- Responsabilidad.- La Asociación responderá de sus obligaciones con todos sus bienes presentes y futuros.
      Los socios no responderán personalmente de las deudas de la Asociación.
    draft_text: |-
      1. El procediment disciplinari s’iniciarà per Resolució de la Junta Directiva, d’ofici o a instància de part, excepte en els supòsits en què aquestos Estatuts atribuïsquen aquesta competència a l’Assemblea General.

      2. Qualsevol Persona Associada o persona directament afectada pels fets podrà posar-los en coneixement de la Junta Directiva. La Junta Directiva acordarà motivadament l’inici de l’expedient o l’arxivament de les actuacions, sense perjudici de les mesures de protecció o organització interna que puguen correspondre.

      3. La Resolució d’inici haurà d’identificar suficientment els fets que motiven l’expedient, la falta que poguera correspondre, la persona afectada, la persona instructora o Comissió Instructora encarregada de la tramitació i, si escau, les mesures cautelars que s’adopten. Aquesta Resolució haurà de notificar-se a la persona afectada en el termini màxim de deu dies naturals des de la seua adopció.

      4. La instrucció correspondrà, amb caràcter general, a una persona instructora designada per l’òrgan que acorde l’inici de l’expedient, que no podrà formar part de l’òrgan competent per a resoldre ni intervindre en la resolució de l’expedient. Quan la naturalesa, complexitat o especial sensibilitat de l’expedient ho faça convenient, podrà designar-se una Comissió Instructora o una persona externa independent.

      5. La persona instructora o les persones membres de la Comissió Instructora hauran de ser Persones Associades majors d’edat, en ple exercici dels seus drets socials, o persones externes independents, i no podran formar part de l’òrgan que haja de resoldre l’expedient. Hauran d’actuar amb imparcialitat, confidencialitat i diligència, i no podran haver intervingut directament en els fets, tindre interés personal en l’assumpte, relació directa amb la persona afectada o amb la persona denunciant, ni incórrer en cap altra circumstància que puga comprometre la seua imparcialitat.

      6. La persona afectada haurà de ser informada dels fets que se li imputen, de la falta que poguera correspondre i de les sancions que pogueren imposar-se, i disposarà d’un termini de deu dies naturals, comptats des de la notificació de la Resolució d’inici del procediment, per a formular al·legacions i proposar les proves que estime oportunes.

      7. La persona instructora o Comissió Instructora practicarà les actuacions necessàries per a l’esclariment dels fets, admetrà les proves que siguen pertinents i podrà rebutjar motivadament les que siguen improcedents, innecessàries o desproporcionades.

      8. Finalitzada la instrucció, la persona instructora o Comissió Instructora formularà una proposta de resolució motivada, que haurà d’indicar els fets que es consideren provats, la falta que poguera correspondre, la sanció proposada o, si escau, l’arxivament de l’expedient. Aquesta proposta es comunicarà a la persona afectada, que disposarà d’un termini de set dies naturals per a formular al·legacions finals.

      9. La fase d’instrucció haurà de desenvolupar-se en el termini màxim de trenta dies naturals des de la finalització del termini inicial d’al·legacions. Aquest termini podrà ampliar-se motivadament per un màxim de trenta dies naturals addicionals quan la complexitat de l’expedient ho justifique.

      10. L’expedient haurà de resoldre’s en el termini màxim de tres mesos des de la Resolució d’inici, excepte suspensió justificada per causa legal, força major o actuacions davant l’autoritat competent.

      11. La resolució de l’expedient correspondrà a la Junta Directiva, excepte quan l’expedient afecte persones que formen part de la Junta Directiva o quan aquestos Estatuts atribuïsquen expressament la competència a l’Assemblea General.

      12. Les resolucions disciplinàries hauran de ser motivades i indicaran els fets provats, la falta comesa, la sanció imposada, la data a partir de la qual produirà efectes i les vies de revisió interna o impugnació judicial que procedisquen d’acord amb aquestos Estatuts i la normativa vigent.

      13. Quan la sanció siga l’expulsió de la Societat, la resolució de la Junta Directiva no serà executiva fins que siga ratificada per l’Assemblea General.

      14. Durant la tramitació de l’expedient, l’òrgan competent per a iniciar-lo podrà acordar motivadament mesures cautelars proporcionades, quan siguen necessàries per a protegir les persones, els béns de la Societat, el funcionament de les activitats o la correcta tramitació de l’expedient. Aquestes mesures no tindran caràcter sancionador, hauran de limitar-se al temps estrictament necessari i decauran en resoldre’s l’expedient.

      15. Si els fets pogueren ser constitutius d’infracció penal i s’haguera interposat denúncia o querella, la Societat no instruirà procediment disciplinari sobre aquests mateixos fets o, si ja s’haguera instruït, s’abstindrà de resoldre’l fins que recaiga sentència ferma, sobreseïment o arxivament, sense perjudici de les mesures cautelars o de protecció que resulten necessàries.
