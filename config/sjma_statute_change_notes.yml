    old_text: |-
      Articulo 21.- Del funcionamiento de la Asamblea General.- La Asamblea General se reunirá en sesiones Ordinarias y Extraordinarias.

      La Asamblea General se reunirá con carácter ordinario una vez al año, y su Orden del Día comprenderá, al menos, los siguientes puntos:

      a) Aprobar o censurar la gestión y actuación de la Junta Directiva o de sus miembros, y la Memoria de actividades del último año.

      b) Aprobar los presupuestos ordinarios y extraordinarios elaborados por la Junta Directiva.

      c) Aprobar las cuentas generales de ingresos y gastos y el balance-inventario anual.

      d) Determinar las cuotas que hayan de satisfacer los socios cuando deban modificarse a propuesta de la Junta Directiva.

      e) Elegir y cesar a la Junta Directiva, cuando sea procedente de conformidad con estos Estatutos.

      f) Ruegos y preguntas. También, en la Asamblea General Ordinaria podrán ampliarse los puntos de su Orden del Día con las demás materias de competencia de la Asamblea General que se relacionan en el artículo anterior, siempre que así se acuerde por la Junta Directiva.

      La Asamblea General se reunirá con carácter extraordinario cuando así lo acuerde el Presidente, o un tercio de los miembros de la Junta Directiva, o a petición del 10 por ciento de los socios, y en cuya solicitud se expresará de manera concreta el Orden del Día que deberá ser objeto de la convocatoria. La petición será dirigida por carta al Presidente de la Asociación, y habrá de convocarse dentro de los 15 días siguientes a la petición, y habrá de celebrarse necesariamente dentro de los 30 días naturales, contados desde la fecha de la solicitud En dicha Asamblea General Extraordinaria no podrán ser tratados en la misma más asuntos que los expresados en la convocatoria.
