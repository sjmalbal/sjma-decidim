    draft_text: |-
      1. La Junta Directiva serà escollida per l’Assemblea General mitjançant candidatures completes en llista tancada, d’acord amb el que estableixen aquests Estatuts.

      2. El procediment electoral per a triar la Junta Directiva es regirà per les següents normes:

      A l’efecte de participar en les eleccions internes, només formaran part del cens electoral les persones que hagueren adquirit la condició de Persona Associada abans de la data de convocatòria de les eleccions.

      b) Les candidatures es presentaran com a llistes tancades a la Junta Directiva en el termini de 7 dies naturals comptats des de l’endemà de la convocatòria de l’Assemblea en què es vaja a celebrar l’elecció, mitjançant escrit presentat a la Junta Directiva, per correu electrònic, formulari electrònic o altres canals habilitats per la Societat.

      En aquest escrit haurà de figurar la relació completa de persones que integren la candidatura i el càrrec que desenvoluparà cadascuna dins de la Junta Directiva.

      En cap cas es tractarà d’una llista oberta ni d’una elecció separada per càrrecs, de manera que el vot recaurà sobre la candidatura completa a la Junta Directiva.

      El dia natural següent a la finalització del termini de presentació, la Junta Directiva farà publicitat de les candidatures presentades al Tauler d’Anuncis de la Societat, per correu electrònic i pels altres canals habituals de comunicació de la Societat.

      Entre la publicació de les candidatures i la sessió de l’Assemblea en què s’haja de votar hauran de transcórrer, almenys, 7 dies naturals, perquè les Persones Associades que formen part del cens electoral puguen conéixer les candidatures i formar el seu criteri de vot.

      c) Abans d’efectuar la votació, les candidatures exposaran les seues propostes i projectes per a la Societat. A més, hauran de presentar totes les persones que integren la candidatura i els càrrecs que desenvoluparan. A partir d’aquestos punts, podran debatre i confrontar posicions amb les restants candidatures.

      Correspondrà a la Persona Associada de major edat present en la sessió moderar les intervencions i el debat, per al qual passarà a formar part de la Mesa de l’Assemblea General com a persona moderadora. En cas que aquesta Persona Associada integrara també una candidatura a la Junta Directiva, exercirà la funció de persona moderadora la següent Persona Associada de més edat, i així successivament.

      d) L’elecció de la Junta Directiva es realitzarà sempre mitjançant votació secreta, inclús quan només s’haja presentat una única candidatura.

      El sistema de votació haurà de permetre identificar de manera clara les candidatures presentades i preservar en tot cas el caràcter secret del vot.

      e) Serà escollida la candidatura a la Junta Directiva que obtinga el major nombre de vots de les Persones Associades presents o representades.

      En cas d’empat entre les candidatures amb major nombre de vots, es farà una nova votació entre aquestes candidatures en la mateixa sessió; si l’empat persistira, l’Assemblea General acordarà la continuïtat del procés electoral d’acord amb aquests Estatuts.

      f) Les Persones Associades podran delegar el seu dret de votació en les eleccions a la Junta Directiva en altra Persona Associada representant en els termes previstos en aquestos Estatuts. L’autorització de la representació haurà de contindre únicament les dades exigides amb caràcter general per a la delegació de veu i vot, sense indicar el sentit del vot de la persona representada.

      En les votacions secretes, la Persona Associada representant podrà emetre el seu vot i els vots corresponents a les Persones Associades que represente, preservant en tot cas el caràcter secret del vot.

      g) La candidatura a la Junta Directiva que resulte escollida assumirà els càrrecs que consten en la llista tancada presentada, sense necessitat de designació posterior per part de la Presidència.
