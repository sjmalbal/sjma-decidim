  Article 100.:
  - kind: addition
    summary: >-
      Justificació: introdueix un procediment específic de modificació estatutària perquè els canvis futurs tinguen un marc
      clar.
    old_text: ''
    draft_text: |-
      1. La modificació dels Estatuts es regirà per les regles contingudes en aquest Capítol i, en allò no previst, en el que prescriguen estos Estatuts per als supòsits anàlegs.

      2. La proposta de modificació podrà ser presentada per resolució de la Junta Directiva prèvia a la convocatòria de la primera Assemblea General Extraordinària o per iniciativa conjunta d’un 10 per cent de Persones Associades.

      3. El procés de qualsevol modificació d’aquestos Estatuts comprendrà la realització de dues Assemblees Generals Extraordinàries.

      A la primera Assemblea General Extraordinària que siga convocada, es presentarà la proposta provisional de modificació dels Estatuts i, en el seu cas, es discutiran i votaran les esmenes que siguen presentades, d’acord amb les regles previstes als articles 101 i 102, per a l’aprovació de la proposta definitiva de modificació dels Estatuts. La convocatòria d’aquesta sessió haurà d’annexar el text de la proposta provisional de modificació.

      Una vegada realitzada aquesta sessió, es procedirà a convocar la segona Assemblea General Extraordinària per a l’aprovació del text definitiu de modificació, una vegada incorporades les esmenes que, en el seu cas, foren aprovades a la primera sessió. Aquesta sessió haurà de ser convocada només a tal efecte, sense que puga incloure’s cap altre assumpte en l’ordre del dia.
    old_article_refs: []
  Article 101.:
  - kind: addition
    summary: >-
      Justificació: regula la presentació i tramitació d'esmenes per facilitar una deliberació ordenada de les persones associades.
    old_text: ''
    draft_text: |-
      1. Les esmenes són l’instrument mitjançant el qual les Persones Associades podran plantejar les seues propostes per a millorar o rebutjar les modificacions presentades.

      2. Les Persones Associades podran registrar esmenes a la proposta de modificació a partir del dia següent a la data de la convocatòria de la primera de les sessions de l’Assemblea General descrites a l’article anterior quan tinguen el suport d’un mínim del 5 per cent de les Persones Associades de la Societat i fins a 5 dies abans de dita sessió.

      En cap cas podran presentar-se esmenes per a la segona de les Assemblees Generals descrites a l’article anterior.

      La Junta Directiva habilitarà un model per al registre d’esmenes i obrirà els canals, presencials o telemàtics, que estime oportuns per a la seua recepció. Les esmenes registrades seran signades per la Secretaria i se’n faran tres còpies, una per a la Junta Directiva, una per a la Persona Associada que presente l’esmena i altra per a l’Arxiu.
    old_article_refs: []
  Article 102.:
  - kind: addition
    summary: >-
      Justificació: ordena la votació de les esmenes i del text final per evitar confusió entre debat parcial i aprovació
      global.
    old_text: ''
    draft_text: |-
      1. La primera de les sessions descrites a l’Article 100 discorrerà a partir de les següents regles:

      a) La Presidència de la Junta Directiva, o la persona que designe la Junta Directiva, quan la modificació fora iniciativa de la Junta Directiva, o la persona proponent que es designe a la proposta de modificació, quan aquesta fora iniciativa d’un 10 per cent de les Persones Associades, presentarà la modificació i exposarà els motius per a la seua formulació a l’Assemblea General per a la seua discussió.

      b) Una vegada exposada la modificació, es presentaran les esmenes registrades, llegint el text de l’esmena i la seua motivació, per a la seua votació per ordre de registre. Les esmenes aprovades seran incorporades al text de modificació.

      2. La segona de les sessions descrites a l’Article 100 discorrerà a partir de les següents regles:

      a) La Presidència de l’Assemblea General podrà acordar que se sotmeta a votació la proposta definitiva de modificació dels Estatuts sense lectura prèvia. No obstant això, la lectura prèvia del text en qüestió serà preceptiva si alguna de les Persones Associades presents en la sessió ho sol·licitara.

      b) Per a la votació d’aprovació de la modificació dels Estatuts, la Mesa de l’Assemblea General podrà determinar el sistema de votació entre els següents segons convinga:

      i. Votació del conjunt del text de la modificació.

      ii. Votació de la modificació per mòduls o per parts del text proposat, determinades per la Junta Directiva i indicades a la convocatòria de l’Assemblea.
    old_article_refs: []
