      Articulo 23.- De su constitución.- Ostentarán la condición de Presidente y Secretario de la Ea 5 , Asamblea General los que lo sean de la Junta Directiva. El Secretario redactará el acta de cada reunión que reflejará un extracto de las deliberaciones, el texto de los acuerdos que se hayan adoptado y el resultado numérico de las votaciones. Al comienzo de cada Asamblea se leerá el Acta de la sesión anterior a fin de que se apruebe su redacción. No obstante, los acuerdos adoptados en las Asambleas Generales serán inmediatamente ejecutables.

      La Asamblea General quedará válidamente constituida, en primera convocatoria, cuando concurra a ella al menos un tercio de los asociados y en segunda convocatoria, cualquiera que fuere el número de los asistentes.
