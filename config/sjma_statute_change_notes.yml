      Artículo 30.- De la delegación de facultades o apoderamientos.- La Junta Directiva podrá delegar o apoderar a favor de una o varias personas parte de estas facultades y funciones; y revocar delegaciones o apoderamientos que hubiera efectuado.
    draft_text: |-
      1. La Junta Directiva, en tot allò que no estiga expressament prescrit per aquestos Estatuts, podrà establir el seu propi Reglament orgànic i funcional mitjançant Resolució aprovada en reunió, que serà vigent durant el seu mandat. Mitjançant aquest, podrà determinar l’organització de la Junta Directiva i concretar el repartiment del treball i de les funcions inherents a l’òrgan entre les persones que la componen.

      2. La Junta Directiva podrà encomanar a Persones Associades, comissions, Persones Delegades, persones col·laboradores, professionals o altres persones vinculades a la Societat, quan resulte necessari, tasques concretes de gestió, representació, administració, coordinació o suport vinculades a les seues funcions.

      L’encomana haurà d’indicar què es pot fer, amb quins límits i durant quin termini, i podrà ser revocada en qualsevol moment per la Junta Directiva. Quan comporte representar formalment la Societat davant una federació, administració, entitat o tercer, haurà de constar mitjançant Resolució, apoderament, autorització o document acreditatiu suficient.

      Aquesta encomana no podrà substituir la Junta Directiva en l’adopció de decisions que corresponguen a aquest òrgan, ni permetre l’exercici de competències reservades a l’Assemblea General.

      La persona o persones encomanades hauran d’actuar en interés de la Societat, dins dels límits rebuts, i hauran de donar compte de la seua actuació a la Junta Directiva.

      3. En tot cas, corresponen a la Junta Directiva les funcions següents:

      a) Vetlar per l’acompliment d’aquestos Estatuts i dels fins socials, convocar les Assemblees Generals i complir i fer complir els Acords adoptats en aquestes.

      b) Proposar a l’Assemblea General l’establiment de les quotes que les Persones Associades hagen de pagar.

      c) Presentar a l’Assemblea General els Comptes Anuals de cada exercici.

      d) Portar una comptabilitat conforme a les normes específiques que permeta obtindre la imatge fidel del patrimoni, del resultat i de la situació financera de la Societat.

      e) Acordar sobre l’exercici d’accions judicials de qualsevol ordre i recursos administratius, així com decidir sobre totes les intervencions i actuacions que se’n deriven.

      f) Tramitar i resoldre inicialment sobre les sol·licituds d’admissió de Persones Associades, dur-ne la relació actualitzada i elevar les altes i separacions definitives a l’Assemblea General quan corresponga d’acord amb aquests Estatuts.

      g) Nomenar, contractar, separar o acordar l’extinció que corresponga de les Direccions tècnic-artístiques de les Agrupacions Artístiques Titulars, així com nomenar o separar els càrrecs que conformen l’Equip Directiu de l’Escola de la Societat.

      En el cas de les Direccions tècnic-artístiques de les Agrupacions Artístiques Titulars, la Junta Directiva haurà d’escoltar prèviament la Comissió Mixta d’Agrupacions o les Persones Delegades de l’Agrupació afectada, sempre que la naturalesa de la decisió ho permeta, sense perjudici de la normativa laboral i de la confidencialitat que corresponga.

      h) Contractar o acomiadar el personal de l’Escola a proposta de l’Equip Directiu de l’Escola.

      i) Programar les activitats que s’hagen de desenvolupar, i organitzar, impulsar, ordenar i controlar tots els assumptes referents a les Agrupacions Artístiques Titulars, l’Escola i altres seccions i comissions culturals creades al si de la Societat.

      j) Aprovar les operacions que impliquen contraprestacions econòmiques a satisfer per part de la Societat que siguen iguals o superiors a la quantitat de 1.000 €, sense perjudici de les competències reservades a l’Assemblea General.

      k) Aprovar els reglaments interns que desenvolupen aquestos Estatuts quan no siga competència de l’Assemblea General.

      l) Convocar i dirigir consultes internes al conjunt de Persones Associades.

      m) Qualsevol altra facultat que no estiga expressament i específicament atribuïda a cap altre òrgan de govern i administració de la Societat, o que se delegue de manera expressa a la Junta Directiva.
