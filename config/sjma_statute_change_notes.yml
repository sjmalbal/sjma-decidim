      Són faltes greus:

      a) La desobediència als Acords i Resolucions dels òrgans de govern i de representació, o a les indicacions legítimes de les persones que exercisquen càrrecs o funcions dins de la Societat, quan no constituïsca falta molt greu.

      b) Els altercats o manifestacions injurioses, vexatòries, discriminatòries o greument ofensives cap als òrgans de govern i de representació, cap a altres Persones Associades o cap a persones vinculades a les activitats de la Societat.

      c) La falta de respecte i consideració greu cap a les direccions tècnic-artístiques, personal, persones participants o públic en general en els actes, activitats o espais de la Societat.

      d) Les conductes que perjudiquen greument la convivència, el bon nom, la dignitat o el normal funcionament de la Societat.

      e) L’impagament de les quotes, derrames o altres obligacions econòmiques aprovades per l’Assemblea General durant un exercici econòmic, quan haja existit requeriment previ de pagament i no s’haja regularitzat la situació ni comunicat la voluntat de causar baixa.

      f) La comissió de tres faltes lleus no prescrites, sempre que les anteriors hagen sigut declarades per resolució disciplinària ferma.

      g) L’incompliment greu de les normes d’organització, funcionament, convivència o disciplina de l’Escola, de les Agrupacions Artístiques Titulars, de les activitats socials o de les altres activitats organitzades per la Societat, quan no constituïsca falta molt greu.

      h) La inassistència, impuntualitat o abandonament injustificat d’actuacions, concerts, actes, desplaçaments, serveis, activitats o compromisos per als quals la Persona Associada haja confirmat o assumit la participació, quan cause un perjudici rellevant a l’Agrupació, a l’Escola, a la Societat o a terceres persones.

      i) L’ús no autoritzat, la mala custòdia, l’alteració, la cessió a terceres persones, la retenció injustificada o la no devolució d’instruments, material, uniformes, documents, claus, credencials, instal·lacions o altres béns de la Societat, quan no constituïsca falta molt greu.

      j) L’incompliment greu de les funcions, responsabilitats o encàrrecs assumits davant la Societat, incloses les funcions delegades, de representació, custòdia, coordinació, documentació o gestió, quan no constituïsca falta molt greu.

      k) L’ús indegut de canals de comunicació, xarxes socials, documents, dades, credencials, sistemes d’informació o altres recursos de la Societat, quan no constituïsca falta molt greu.
