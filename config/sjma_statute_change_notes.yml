      Articulo 15.- Los Socios Numerarios tendrán los mismos derechos y deberes. Son DERECHOS de los socios, los siguientes:

      a) Asistir a las Asambleas Generales con derecho a voz y voto.

      b) Elegir y ser elegido para puestos de representación y ejercicio de cargos directivos. Para poder ser miembro de los órganos de representación es requisito imprescindible ser mayor de edad, estar en pleno uso de los derechos civiles y no estar incurso en los motivos de incompatibilidad establecidos en la legislación vigente.

      e) A la participación en las actividades sociales, en los equipos de trabajo y asistencia 4 les actos culturales, musicales y recreativos que se organicen, observando las normas y requisitos qué se establezcan, en cada caso, por la Junta Directiva.

      d) A hacer uso de los bienes y servicios comunes de la Asociación, en los términos acordados por la Junta Directiva.

      e) A recibir información adecuada y suficiente de la administración y gestión de la Junta Directiva, de la composición de los órganos de gobierno y representación y a que se le pongan de manifiesto las cuentas de gastos e ingresos de la Asociación, del Inventario y Balance anual, así a como de los acuerdos adoptados por la Junta Directiva y por la Asamblea General.

      f) A ser oído con carácter previo a la adopción de medidas disciplinarias contra él yaser ! informado de los hechos que den lugar a tales medidas, debiendo ser motivado el acuerdo que, en ' su caso, imponga la sanción.

      g) A impugnar los acuerdos de los órganos de la Asociación que estime contrarios a la Ley o 0 alos Estatutos. 1 Cs
