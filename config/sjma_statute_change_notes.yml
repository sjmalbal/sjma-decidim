  Article 80. De les faltes molt greus:
  - kind: addition
    summary: 'Justificació: defineix les faltes molt greus per evitar que les sancions més severes depenguen d''una regulació
      genèrica.'
    old_text: ''
    draft_text: |-
      Són faltes molt greus:

      a) Qualsevol acte o omissió que constituïsca una infracció penal amb qualificació de delicte.

      b) La falta de probitat en la custòdia dels fons socials que li foren confiats per raó del càrrec en l’administració, gestió i recaptació d’aquestos.

      c) La desobediència greu dels Acords i Resolucions dels òrgans de govern i de representació de la Societat en l’àmbit de les seues competències i en l’exercici de les seues funcions.

      d) Amb respecte a les persones que componen la Junta Directiva, la no execució dolosa de les disposicions estatutàries i dels Acords de l’Assemblea General.

      e) Causar danys dolosament o pèrdues a les coses, útils, estris, edificis o demés pertinències socials i especialment l’instrumental musical que haguera estat confiat.

      f) La falta de pagament de les quotes socials durant dos exercicis econòmics consecutius quan no es notifique a la Junta Directiva la voluntat de ser donada de baixa com a Persona Associada.

      g) La reiteració o reincidència de tres faltes greus.
    old_article_refs: []
  Article 81. De les faltes greus:
  - kind: addition
    summary: 'Justificació: defineix les faltes greus i diferencia millor els incompliments segons la seua intensitat.'
    old_text: ''
    draft_text: |-
      Són faltes greus:

      a) La falta d’obediència a les persones que ocupen càrrecs de la Junta Directiva en matèria de la seua competència i funcions en l’execució dels Acords i Resolucions quan aquella no produïsca trastorns massa greus en la gestió i funcionament de la Societat.

      b) Els altercats o manifestacions de descrèdit o menyspreu greus cap als òrgans de govern i de representació, o cap a altres Persones Associades en les activitats de la Societat.

      c) La falta de respecte i consideració greus a dirigents, direccions tècnic-artístiques i persones associades o al públic en general en els actes de la Societat.

      d) Les conductes que atempten greument contra el decor i dignitat de la Societat.

      e) La falta de pagament de la quota social durant un exercici econòmic quan no es notifique a la Junta Directiva la voluntat de ser donada de baixa com a Persona Associada.

      f) La reiteració o reincidència en la comissió de tres faltes lleus en un període de 6 mesos.
    old_article_refs: []
