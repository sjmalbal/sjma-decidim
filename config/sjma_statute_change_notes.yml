  Article 46. De les funcions i competències de les Assemblees de Músics:
  - kind: addition
    summary: >-
      Justificació: atribueix funcions concretes a les Assemblees de Músics per ordenar consultes, dictàmens i participació
      artística.
    old_text: ''
    draft_text: |-
      Són funcions i competències de les Assemblees de Músics:

      a) Ser l’espai de debat i discussió dels músics per a tots els assumptes relatius a l’estat i funcionament de les agrupacions artístiques.

      b) Formular Dictàmens per a informar dels assumptes que consideren als òrgans de govern i representació que corresponga en cada cas i per a plantejar propostes als òrgans de govern i de representació. Els Dictàmens recolliran els resultats de les votacions realitzades i les corrents d’opinió que, en el seu cas, s’expressen en els debats duts a terme.

      c) Proposar mitjançant Dictamen la modificació de les disposicions reglamentàries que siguen aprovades per la Junta Directiva i que afecten a l’agrupació artística de que es tracte. La proposta serà feta amb caràcter facultatiu per a la Junta Directiva.

      d) Proposar mitjançant Dictamen a la Junta Directiva la realització de consultes vinculants als músics actius sobre els assumptes de major rellevància de la corresponent agrupació artística. La proposta serà feta amb caràcter preceptiu a la Junta Directiva.

      e) Participar del procés d’elecció de la Direcció tècnic-artística mitjançant l’elecció d’entre 3 i 7 músics en actiu escollits per votació d’entre les persones interessades en participar del procés. Aquestos hauran d’estar presents al procés de selecció i, en qualsevol cas, hauran de ser convidats a tota reunió de la Junta Directiva en què es tracte aquesta qüestió o vaja a ser finalment nomenada la nova Direcció tècnic-artística en qualitat d’assessors artístics.
    old_article_refs: []
  Article 47. Del funcionament de les Assemblees de Músics:
  - kind: addition
    summary: >-
      Justificació: regula el funcionament pràctic de les Assemblees de Músics perquè les convocatòries, sessions i votacions
      siguen previsibles.
    old_text: ''
    draft_text: |-
      1. Els músics es constituiran en Assemblea en els següents casos:

      a) Quan ho sol·liciten un mínim de 2 Persones Delegades.

      b) Quan ho sol·licite la Direcció tècnic-artística. En aquest cas, la Direcció tècnic-artística podrà assistir a l’Assemblea que s’hi constituïsca amb dret a veu i sense dret a vot.

      c) Quan ho sol·licite la Presidència de la Junta Directiva. En aquest cas, la Junta Directiva podrà assistir a l’Assemblea que s’hi constituïsca amb dret a veu i sense dret a vot.

      d) Quan ho sol·liciten un mínim del 10 per cent dels músics actius.

      2. En tots els casos previstos a l’Article anterior, es comunicarà a les Persones Delegades de l’agrupació artística de què es tracte per a que emeten una Convocatòria per a reunir l’Assemblea dins dels 30 dies naturals següents al dia en què es produïra la sol·licitud i amb una antelació mínima de 10 dies. En la Convocatòria es farà constar el dia, lloc i hora de les convocatòries en que es durà a terme l’Assemblea, considerant en tot cas facilitar la màxima assistència a aquesta.

      La Convocatòria serà publicada al Tauler d’Anuncis de la Societat i als mitjans de comunicació i publicitat que es consideren oportuns.

      3. L’Assemblea queda vàlidament constituïda en primera Convocatòria quan concorren en ella un terç dels músics actius. Si a la primera Convocatòria no concorreguera la xifra de músics actius assenyalada, es procedirà a la segona Convocatòria, esta volta sense subjecció a quòrum. Si aquesta no haguera estat prevista a l’escrit de convocatòria, serà novament convocada dins dels 8 dies naturals següents a la primera convocatòria no celebrada i amb una antelació mínima de 2 dies.

      4. La Persona Delegada de més edat d’entre les que ho foren en eixe moment exercirà la Presidència de l’Assemblea de Músics. S’encarregarà de dirigir la sessió, ordenant el torn de paraula i coordinant les votacions que s’hi duguen a terme.

      5. La Persona Delegada de menys edat d’entre les que ho foren en eixe moment exercirà el Secretariat de l’Assemblea de Músics. S’encarregarà d’alçar acta i de transmetre els Dictàmens que s’hi realitzen a l’òrgan de govern i representació que corresponga o a la Direcció tècnic-artística segons corresponga en cada cas.
    old_article_refs: []
